<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./ContactStyle/contant.css">
    <title>Contact</title>
</head>

<body>

    <div class="container">

        <header class="headerBar">
            <div class="logo">
                <a href="../index.html">
                    <h1>Yogi</h1>
                </a>
            </div>

            <nav class="navBar">
                <a href="../Pricing/pricing.html"><span></span>Pricing</a>
                <a href="../About/about.html"><span></span>About Us</a>
                <a href="./contact.html"><span></span>Contact</a>
                <a href="#" class="navBtn1">Login</a>
                <a href="#" class="navBtn2">Sign Up</a>
            </nav>
        </header>


        <section class="contactSection">
            <div class="contactBar">
                <div class="contactImage">
                    <img width="100%" src="../Images/Rectangle 15 (2).svg" alt="">
                </div>
                <div class="contactElements">
                    <h1>Contact Us</h1>
                    <p>Questions, bug reports, feedback.</p>

                    <div class="inputBar">
                        <label for="email">Your mail</label><br>
                        <input type="email" id="email" name="email"  placeholder="Enter your email">
                    </div>

                    <div class="inputBar">
                        <label for="bio">Tell us what you need help with:</label><br>
                        <textarea name="bio" id="bio" cols="60" rows="5" placeholder="Enter a topic"></textarea>
                    </div>

                    <button>Send now</button>
                </div>
            </div>
        </section>


        <footer class="footerSection">
            <div class="footerBar1">
                <div class="footerLeft">
                    <div class="footerBox">
                        <h3>Company</h3>
                        <a href="#">About Us</a>
                        <a href="#">Partners</a>
                        <a href="#">Blog</a>
                        <a href="#">Careers</a>
                    </div>
                    <div class="footerBox footerBoxEl">
                        <h3>Contact</h3>
                        <a href="#">Terms of Use</a>
                        <a href="#">Privacy Policy</a>
                        <a href="#">F.A.Q</a>
                    </div>
                </div>
                <div class="footerRight">
                    <select name="city" id="city">
                        <option value="0">Global</option>
                        <option value="1">USA</option>
                        <option value="2">Russia</option>
                        <option value="3">Uzbekistan</option>
                        <option value="4">Kazak</option>
                        <option value="5">Qirkiz</option>
                    </select>
                </div>
                
            </div>
            <div class="footerline"></div>
            <div class="footerBar2">
                <div class="footerTextBar"><p>© 2021 Yogi.com</p></div>
                <div class="footerSocial">
                    <a href="#"><i class="bi bi-facebook"></i></a>
                    <a href="#"><i class="bi bi-twitter"></i></a>
                    <a href="#"><i class="bi bi-instagram"></i></a>
                    <a href="#"><i class="bi bi-youtube"></i></a>
                </div>
            </div>
        </footer>

    </div>

</body>

</html>
